name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Prepare icon
        id: icon
        shell: bash
        run: |
          if [ -f "assets/favicon.icns" ]; then
            echo "icon_path=assets/favicon.icns" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f "assets/logo.png" ]; then
            echo "icon_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p build/iconset
          sips -z 16 16 assets/logo.png --out build/iconset/icon_16x16.png
          sips -z 32 32 assets/logo.png --out build/iconset/icon_16x16@2x.png
          sips -z 32 32 assets/logo.png --out build/iconset/icon_32x32.png
          sips -z 64 64 assets/logo.png --out build/iconset/icon_32x32@2x.png
          sips -z 128 128 assets/logo.png --out build/iconset/icon_128x128.png
          sips -z 256 256 assets/logo.png --out build/iconset/icon_128x128@2x.png
          sips -z 256 256 assets/logo.png --out build/iconset/icon_256x256.png
          sips -z 512 512 assets/logo.png --out build/iconset/icon_256x256@2x.png
          sips -z 512 512 assets/logo.png --out build/iconset/icon_512x512.png
          sips -z 1024 1024 assets/logo.png --out build/iconset/icon_512x512@2x.png
          iconutil -c icns build/iconset -o build/AppIcon.icns
          echo "icon_path=build/AppIcon.icns" >> "$GITHUB_OUTPUT"

      - name: Build app with PyInstaller
        shell: bash
        run: |
          FLET_APP_PATH="$(python - <<'PY'
          import pathlib
          import flet_desktop
          print(pathlib.Path(flet_desktop.__file__).resolve().parent / "app")
          PY
          )"

          ICON_ARG=()
          if [ -n "${{ steps.icon.outputs.icon_path }}" ]; then
            ICON_ARG=(--icon "${{ steps.icon.outputs.icon_path }}")
          fi

          pyinstaller --noconfirm --clean --windowed \
            --name "Agency Manager" \
            "${ICON_ARG[@]}" \
            --add-data "assets:assets" \
            --add-data "${FLET_APP_PATH}:flet_desktop/app" \
            main.py

      - name: Zip .app bundle
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Agency Manager.app" "Agency Manager-macos.app.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Agency-Manager-macos-app
          path: dist/Agency Manager-macos.app.zip
          if-no-files-found: error
