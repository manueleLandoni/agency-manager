name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller flet-desktop pillow

      - name: Prepare icon
        id: icon
        shell: bash
        run: |
          if [ -f "assets/favicon.icns" ]; then
            echo "icon_path=assets/favicon.icns" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f "assets/favicon.ico" ]; then
            echo "icon_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p build
          python - <<'PY'
          from PIL import Image

          src = "assets/favicon.ico"
          dst = "build/AppIcon.icns"

          img = Image.open(src).convert("RGBA")
          w, h = img.size
          side = max(w, h)

          # Create a square transparent canvas before exporting to icns.
          canvas = Image.new("RGBA", (side, side), (0, 0, 0, 0))
          canvas.paste(img, ((side - w) // 2, (side - h) // 2))
          if side < 1024:
              canvas = canvas.resize((1024, 1024), Image.Resampling.LANCZOS)
          canvas.save(dst)
          PY

          if [ -f "build/AppIcon.icns" ]; then
            echo "icon_path=build/AppIcon.icns" >> "$GITHUB_OUTPUT"
          else
            echo "icon_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app with PyInstaller
        shell: bash
        run: |
          FLET_APP_PATH="$(python - <<'PY'
          import pathlib
          try:
              import flet_desktop
              print(pathlib.Path(flet_desktop.__file__).resolve().parent / "app")
          except Exception:
              print("")
          PY
          )"

          ICON_ARG=()
          if [ -n "${{ steps.icon.outputs.icon_path }}" ]; then
            ICON_ARG=(--icon "${{ steps.icon.outputs.icon_path }}")
          fi

          EXTRA_DATA=("--add-data" "assets:assets")
          if [ -n "$FLET_APP_PATH" ]; then
            EXTRA_DATA+=("--add-data" "${FLET_APP_PATH}:flet_desktop/app")
          fi

          pyinstaller --noconfirm --clean --windowed \
            --name "Agency Manager" \
            "${ICON_ARG[@]}" \
            "${EXTRA_DATA[@]}" \
            main.py

      - name: Zip .app bundle
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Agency Manager.app" "Agency Manager-macos.app.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Agency-Manager-macos-app
          path: dist/Agency Manager-macos.app.zip
          if-no-files-found: error
